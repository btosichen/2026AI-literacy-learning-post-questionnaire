<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 AI 素養學習後問卷</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Canvas Confetti for success animation -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary-blue': '#3ABEFF',
                        'neon-purple': '#9D4DFF',
                        'mint-green': '#1DD1A1',
                        'light-yellow': '#FFE66D',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                        'pulse-glow': 'pulseGlow 2s infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { boxShadow: '0 0 10px rgba(157,77,255,0.4)' },
                            '50%': { boxShadow: '0 0 20px rgba(157,77,255,0.8)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Styles for Radio Buttons and Scrollbar */
        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #f3e5f5 50%, #fff9c4 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Hide scrollbar for clean look but keep functionality */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3ABEFF; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #9D4DFF; }

        /* Custom Radio Styling via Tailwind peer class */
        .likert-label {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input[type="radio"]:checked + .likert-label {
            background-color: #9D4DFF;
            color: white;
            box-shadow: 0 0 15px rgba(157, 77, 255, 0.6);
            transform: scale(1.05);
            border-color: #9D4DFF;
        }
        
        /* Smooth scrolling */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-20">

    <!-- Progress Bar (Sticky Top) -->
    <div class="fixed top-0 left-0 w-full h-2 bg-gray-200 z-50">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-mint-green via-primary-blue to-neon-purple w-0 transition-all duration-500 ease-out shadow-[0_0_10px_rgba(29,209,161,0.8)]"></div>
    </div>
    <div class="fixed top-3 right-4 z-50 bg-white/80 px-3 py-1 rounded-full shadow-sm text-sm font-bold text-neon-purple backdrop-blur-sm">
        進度: <span id="progress-text">0%</span>
    </div>

    <div class="max-w-4xl mx-auto pt-12 px-4 sm:px-6 lg:px-8">
        
        <!-- Header -->
        <div class="text-center mb-10 opacity-0 animate-fade-in-up" style="animation-delay: 0.1s;">
            <div class="inline-block p-4 rounded-full bg-white shadow-lg mb-4">
                <span class="text-5xl">🤖</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primary-blue to-neon-purple mb-4">
                AI 素養學習後問卷
            </h1>
            <p class="text-lg text-gray-600 font-medium bg-white/50 inline-block px-4 py-2 rounded-full">
                探索你的 AI 學習足跡，看見你的成長！ ✨
            </p>
        </div>

        <form id="survey-form" class="space-y-8">
            
            <!-- User Info Section -->
            <div class="glass-card rounded-3xl shadow-xl p-6 md:p-8 opacity-0 animate-fade-in-up border-t-4 border-t-primary-blue" style="animation-delay: 0.2s;">
                <h2 class="text-2xl font-bold mb-6 flex items-center text-primary-blue">
                    <span class="text-3xl mr-2">🎓</span> 基本資料
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-bold mb-2 text-gray-700">班級 <span class="text-red-500">*</span></label>
                        <select name="class" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary-blue focus:ring-2 focus:ring-primary-blue/20 outline-none transition-all appearance-none bg-white">
                            <option value="" disabled selected>請選擇班級</option>
                            <option value="801">801</option>
                            <option value="802">802</option>
                            <option value="803">803</option>
                            <option value="804">804</option>
                            <option value="805">805</option>
                            <option value="806">806</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2 text-gray-700">座號 <span class="text-red-500">*</span></label>
                        <input type="number" name="seat" min="1" max="50" required placeholder="請輸入數字 (1-50)" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary-blue focus:ring-2 focus:ring-primary-blue/20 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2 text-gray-700">姓名 <span class="text-red-500">*</span></label>
                        <input type="text" name="name" required placeholder="請輸入姓名" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-primary-blue focus:ring-2 focus:ring-primary-blue/20 outline-none transition-all">
                    </div>
                </div>
            </div>

            <!-- Dynamic Sections Container -->
            <div id="questions-container"></div>

            <!-- Submit Button -->
            <div class="text-center mt-12 opacity-0 animate-fade-in-up" style="animation-delay: 0.8s;">
                <button type="button" id="btn-submit" class="bg-gradient-to-r from-neon-purple to-primary-blue text-white font-bold text-xl py-4 px-12 rounded-full shadow-[0_10px_20px_rgba(157,77,255,0.3)] hover:shadow-[0_15px_30px_rgba(157,77,255,0.5)] transform hover:-translate-y-1 transition-all duration-300">
                    送出問卷 🎉
                </button>
            </div>
        </form>

        <!-- Results & Analytics Section (Hidden Initially) -->
        <div id="results-section" class="hidden mt-16 space-y-8 animate-fade-in-up">
            <div class="text-center mb-8">
                <h2 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-mint-green to-primary-blue">
                    🌟 你的專屬學習分析報表
                </h2>
                <p class="text-gray-600 mt-2">問卷已成功紀錄，感謝你的用心填寫！</p>
                
                <button id="btn-export" class="mt-6 bg-gray-800 text-white font-bold py-3 px-8 rounded-full shadow-lg hover:bg-gray-700 transition-all flex items-center justify-center mx-auto">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    匯出 CSV 紀錄
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Chart A: Satisfaction -->
                <div class="glass-card rounded-3xl shadow-xl p-6 border-t-4 border-t-primary-blue">
                    <h3 class="text-xl font-bold mb-4 text-center text-gray-800">📊 學習滿意度分析</h3>
                    <div class="relative h-64">
                        <canvas id="chartA"></canvas>
                    </div>
                </div>
                <!-- Chart B: Literacy Radar -->
                <div class="glass-card rounded-3xl shadow-xl p-6 border-t-4 border-t-neon-purple">
                    <h3 class="text-xl font-bold mb-4 text-center text-gray-800">🧠 AI 素養雷達圖</h3>
                    <div class="relative h-64 flex justify-center">
                        <canvas id="chartB"></canvas>
                    </div>
                </div>
                <!-- Chart C: Behavior -->
                <div class="glass-card rounded-3xl shadow-xl p-6 md:col-span-2 border-t-4 border-t-mint-green">
                    <h3 class="text-xl font-bold mb-4 text-center text-gray-800">🔍 態度與行為改變</h3>
                    <div class="relative h-64">
                        <canvas id="chartC"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Modals (Hidden by default) -->
    <!-- 1. Alert Modal -->
    <div id="modal-alert" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/50 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300 border-t-4 border-red-500">
            <div class="text-center">
                <div class="text-5xl mb-4">⚠️</div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">請確認欄位</h3>
                <p id="alert-message" class="text-gray-600 mb-6 line-clamp-3">您還有題目尚未填寫喔！</p>
                <button onclick="closeModal('modal-alert')" class="w-full bg-red-500 text-white font-bold py-3 rounded-xl hover:bg-red-600 transition-colors">
                    我知道了
                </button>
            </div>
        </div>
    </div>

    <!-- 2. Confirm Modal -->
    <div id="modal-confirm" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/50 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300 border-t-4 border-primary-blue">
            <div class="text-center">
                <div class="text-5xl mb-4">🚀</div>
                <h3 class="text-2xl font-bold text-gray-800 mb-2">準備送出？</h3>
                <p class="text-gray-600 mb-6">送出後將產生您的專屬分析圖表！</p>
                <div class="flex gap-4">
                    <button onclick="closeModal('modal-confirm')" class="flex-1 bg-gray-200 text-gray-800 font-bold py-3 rounded-xl hover:bg-gray-300 transition-colors">
                        再檢查一下
                    </button>
                    <button onclick="submitData()" class="flex-1 bg-primary-blue text-white font-bold py-3 rounded-xl hover:bg-blue-500 transition-colors shadow-lg">
                        確認送出
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. Loading Modal -->
    <div id="modal-loading" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/60 backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="text-center text-white">
            <div class="inline-block animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-light-yellow mb-4"></div>
            <h3 class="text-xl font-bold animate-pulse">資料分析中...</h3>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // --- 1. Question Data Configuration ---
        const surveyData = [
            {
                section: 'A',
                title: 'A. 學習滿意度',
                icon: '🟣',
                color: 'neon-purple',
                desc: '請根據你對課程的感受，選擇最符合的程度。(1 = 非常不同意，5 = 非常同意)',
                questions: [
                    "Q1. 這三個單元的內容清楚易懂。",
                    "Q2. 課程舉的例子貼近我的生活。",
                    "Q3. 課程讓我對 AI 有新的認識。",
                    "Q4. 上課方式讓我願意參與討論。",
                    "Q5. 課程的互動活動讓我更容易理解概念。",
                    "Q6. 我覺得這堂課有幫助。",
                    "Q7. 我會推薦這堂課給其他同學。",
                    "Q8. 我覺得課程安排有邏輯且有系統。"
                ]
            },
            {
                section: 'B',
                title: 'B. AI 素養理解程度',
                icon: '🟢',
                color: 'mint-green',
                desc: '測試一下你的 AI 知識！(1 = 非常不同意/不了解，5 = 非常同意/非常了解)',
                questions: [
                    "Q9. 我知道 AI 是從資料中學習規律。",
                    "Q10. 我知道 AI 做的是「預測」而不是「決策」。",
                    "Q11. 我知道 AI 可能會產生錯誤（Hallucination）。",
                    "Q12. 我知道 Deepfake 是什麼。",
                    "Q13. 我知道如何辨識誤導資訊。",
                    "Q14. 我知道什麼是橫向閱讀（Lateral Reading）。",
                    "Q15. 我知道 AI 可能會學到偏見。",
                    "Q16. 我知道為什麼 AI 需要人類監督。",
                    "Q17. 我知道什麼是 Cognitive Effort。",
                    "Q18. 我知道什麼是 Cognitive Debt。"
                ]
            },
            {
                section: 'C',
                title: 'C. 態度與行為改變',
                icon: '🔵',
                color: 'primary-blue',
                desc: '上完課後，你在行為上會有哪些改變？(1 = 非常不同意，5 = 非常同意)',
                questions: [
                    "Q19. 我會在使用 AI 後查證資料。",
                    "Q20. 我會避免直接複製 AI 內容交作業。",
                    "Q21. 我會思考 AI 是否可能有錯。",
                    "Q22. 我會在重要決定時不只依賴 AI。",
                    "Q23. 我會檢查圖片或影片是否可能是 Deepfake。",
                    "Q24. 我會向家人或朋友解釋 AI 的風險。",
                    "Q25. 我會更負責任地使用 AI。"
                ]
            }
        ];

        const sectionD = {
            section: 'D',
            title: 'D. 延伸與反思',
            icon: '🟡',
            color: 'light-yellow',
            desc: '回顧這趟旅程，分享你的看法！',
            questions: [
                {
                    id: 'Q26', text: 'Q26. 在這三個單元中，你覺得哪一個觀念最重要？', type: 'radio',
                    options: ['A. AI 是從資料中找規律', 'B. AI 會產生幻覺 (Hallucination)', 'C. Deepfake 與假訊息辨識', 'D. 預測 ≠ 決策', 'E. Cognitive Effort vs Cognitive Debt']
                },
                {
                    id: 'Q27', text: 'Q27. 哪一個活動對你幫助最大？', type: 'radio',
                    options: ['A. 資料足跡討論', 'B. Effort or Debt 判斷遊戲', 'C. Deepfake 辨識', 'D. 橫向閱讀練習', 'E. 小組設計 AI 使用守則']
                },
                {
                    id: 'Q28', text: 'Q28. 上完課後，你對 AI 的看法改變程度為何？', type: 'likert',
                    labels: ['1 非常沒有改變', '2 有一點改變', '3 普通', '4 明顯改變', '5 非常明顯改變']
                },
                {
                    id: 'Q29', text: 'Q29. 你認為 AI 未來最可能影響哪個領域？', type: 'radio',
                    options: ['A. 教育', 'B. 醫療', 'C. 金融', 'D. 就業與職場', 'E. 社群媒體與新聞']
                },
                {
                    id: 'Q30', text: 'Q30. 學習心得 (請用 1–3 句話寫下這堂課讓你最深刻的一個想法)', type: 'textarea'
                }
            ]
        };

        // --- 2. Render UI ---
        const container = document.getElementById('questions-container');
        let delayBase = 0.3;

        // Render A, B, C Sections
        surveyData.forEach((sec) => {
            let html = `
            <div class="glass-card rounded-3xl shadow-xl p-6 md:p-8 mt-8 opacity-0 animate-fade-in-up border-t-4 border-t-${sec.color}" style="animation-delay: ${delayBase}s;">
                <h2 class="text-2xl font-bold mb-2 flex items-center text-gray-800">
                    <span class="text-3xl mr-2">${sec.icon}</span> ${sec.title}
                </h2>
                <p class="text-gray-500 mb-6 font-medium">${sec.desc}</p>
                <div class="space-y-6">
            `;
            
            sec.questions.forEach((qText) => {
                const qNum = qText.split('.')[0]; // Extract Q1, Q2 etc.
                html += `
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 question-block">
                    <p class="font-bold text-gray-700 mb-3 text-lg">${qText} <span class="text-red-500">*</span></p>
                    <div class="flex flex-wrap justify-between gap-2 max-w-xl">
                        ${[1,2,3,4,5].map(val => `
                            <div class="flex-1 min-w-[3rem]">
                                <input type="radio" name="${qNum}" value="${val}" id="${qNum}-${val}" class="hidden peer" required onchange="updateProgress()">
                                <label for="${qNum}-${val}" class="likert-label block text-center py-2 px-1 border-2 border-gray-200 rounded-xl cursor-pointer text-gray-600 font-bold hover:bg-gray-100">
                                    ${val}
                                </label>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });

            html += `</div></div>`;
            container.innerHTML += html;
            delayBase += 0.1;
        });

        // Render Section D
        let htmlD = `
        <div class="glass-card rounded-3xl shadow-xl p-6 md:p-8 mt-8 opacity-0 animate-fade-in-up border-t-4 border-t-light-yellow" style="animation-delay: ${delayBase}s;">
            <h2 class="text-2xl font-bold mb-2 flex items-center text-gray-800">
                <span class="text-3xl mr-2">${sectionD.icon}</span> ${sectionD.title}
            </h2>
            <p class="text-gray-500 mb-6 font-medium">${sectionD.desc}</p>
            <div class="space-y-6">
        `;

        sectionD.questions.forEach(q => {
            htmlD += `<div class="bg-gray-50 p-4 rounded-2xl border border-gray-100 question-block">
                <p class="font-bold text-gray-700 mb-3 text-lg">${q.text} <span class="text-red-500">*</span></p>`;
            
            if (q.type === 'radio') {
                htmlD += `<div class="space-y-2">`;
                q.options.forEach((opt, idx) => {
                    const optVal = opt.charAt(0); // A, B, C...
                    htmlD += `
                        <div>
                            <input type="radio" name="${q.id}" value="${optVal}" id="${q.id}-${idx}" class="hidden peer" required onchange="updateProgress()">
                            <label for="${q.id}-${idx}" class="likert-label block w-full text-left p-3 border-2 border-gray-200 rounded-xl cursor-pointer text-gray-700 font-medium hover:bg-gray-100">
                                ${opt}
                            </label>
                        </div>
                    `;
                });
                htmlD += `</div>`;
            } else if (q.type === 'likert') {
                htmlD += `<div class="flex flex-col sm:flex-row flex-wrap gap-2">`;
                q.labels.forEach((label, idx) => {
                    const val = idx + 1;
                    htmlD += `
                        <div class="flex-1 min-w-[8rem]">
                            <input type="radio" name="${q.id}" value="${val}" id="${q.id}-${val}" class="hidden peer" required onchange="updateProgress()">
                            <label for="${q.id}-${val}" class="likert-label block h-full text-center p-3 border-2 border-gray-200 rounded-xl cursor-pointer text-gray-700 font-medium hover:bg-gray-100 text-sm flex items-center justify-center">
                                ${label}
                            </label>
                        </div>
                    `;
                });
                htmlD += `</div>`;
            } else if (q.type === 'textarea') {
                htmlD += `
                    <textarea name="${q.id}" rows="3" required oninput="updateProgress()" placeholder="寫下你的想法..." class="w-full p-4 rounded-xl border-2 border-gray-200 focus:border-light-yellow focus:ring-2 focus:ring-yellow-200 outline-none transition-all resize-none"></textarea>
                `;
            }
            htmlD += `</div>`;
        });
        htmlD += `</div></div>`;
        container.innerHTML += htmlD;

        // Add event listeners to initial inputs for progress
        document.querySelectorAll('input[type="text"], input[type="number"], select').forEach(el => {
            el.addEventListener('input', updateProgress);
            el.addEventListener('change', updateProgress);
        });

        // --- 3. Progress Logic ---
        const totalRequired = 33; // 3 user info + 30 questions
        function updateProgress() {
            let filled = 0;
            const form = document.getElementById('survey-form');
            const data = new FormData(form);
            
            // Check text/select inputs
            if(data.get('class')) filled++;
            if(data.get('seat')) filled++;
            if(data.get('name') && data.get('name').trim() !== '') filled++;
            
            // Check questions Q1-Q30
            for(let i=1; i<=30; i++){
                const qVal = data.get(`Q${i}`);
                if(qVal && qVal.trim() !== '') filled++;
            }

            const percentage = Math.round((filled / totalRequired) * 100);
            document.getElementById('progress-bar').style.width = `${percentage}%`;
            document.getElementById('progress-text').innerText = `${percentage}%`;
            
            // Pulse glow when 100%
            if(percentage === 100) {
                document.getElementById('btn-submit').classList.add('animate-pulse-glow');
            } else {
                document.getElementById('btn-submit').classList.remove('animate-pulse-glow');
            }
        }

        // --- 4. Modal Logic ---
        function showModal(id) {
            const modal = document.getElementById(id);
            modal.classList.remove('hidden');
            // Trigger reflow
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            modal.children[0].classList.remove('scale-95');
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            modal.classList.add('opacity-0');
            if(modal.children[0]) modal.children[0].classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // --- 5. Validation & Submission ---
        document.getElementById('btn-submit').addEventListener('click', () => {
            const form = document.getElementById('survey-form');
            if (!form.checkValidity()) {
                // Find first invalid element to show custom message
                const missingFields = [];
                if(!form.class.value) missingFields.push("班級");
                if(!form.seat.value) missingFields.push("座號");
                if(!form.name.value) missingFields.push("姓名");
                
                let missingQCount = 0;
                let firstMissingId = null;
                for(let i=1; i<=30; i++) {
                    const el = form.elements[`Q${i}`];
                    if(el instanceof NodeList || el instanceof HTMLCollection) {
                        if(![...el].some(radio => radio.checked)) {
                            missingQCount++;
                            if(!firstMissingId) firstMissingId = `Q${i}`;
                        }
                    } else if (!el.value.trim()) {
                        missingQCount++;
                        if(!firstMissingId) firstMissingId = `Q${i}`;
                    }
                }

                let msg = "";
                if(missingFields.length > 0) msg += `基本資料缺漏: ${missingFields.join(', ')}<br>`;
                if(missingQCount > 0) msg += `還有 ${missingQCount} 題問卷尚未作答。`;
                
                document.getElementById('alert-message').innerHTML = msg;
                showModal('modal-alert');
                
                // Scroll to first invalid
                if(missingFields.length > 0) form.class.scrollIntoView({behavior: 'smooth', block: 'center'});
                else if(firstMissingId) {
                    const target = document.getElementsByName(firstMissingId)[0];
                    if(target) target.closest('.question-block').scrollIntoView({behavior: 'smooth', block: 'center'});
                }
            } else {
                showModal('modal-confirm');
            }
        });

        // Global variable to hold finalized data
        let finalReportData = {};

        async function submitData() {
            closeModal('modal-confirm');
            showModal('modal-loading');

            const form = document.getElementById('survey-form');
            const formData = new FormData(form);
            const dataObj = {
                timestamp: new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' })
            };
            
            for (let [key, value] of formData.entries()) {
                dataObj[key] = value;
            }

            // Calculate Averages
            const calcAvg = (start, end) => {
                let sum = 0;
                for(let i=start; i<=end; i++) sum += parseInt(dataObj[`Q${i}`]);
                return (sum / (end - start + 1)).toFixed(2);
            }
            
            dataObj.satisfaction_avg = calcAvg(1, 8);
            dataObj.literacy_avg = calcAvg(9, 18);
            dataObj.behavior_avg = calcAvg(19, 25);
            
            finalReportData = dataObj;

            // --- GAS Fetch Upload (Frontend Code) ---
            // 將此處換成你的 GAS 部署網址
            const gasURL = 'https://script.google.com/macros/s/AKfycbyDOVngluXytYy478_Z1dUo1yF2Bp4p8lue7onHVt_qbfRJaeTCZEEzAVC813XSa-DgnQ/exec'; 
            
            try {
                // 如果您尚未部署 GAS，這裡會報 CORS 或 Failed to fetch 錯誤，
                // 為了讓本機能順利展示圖表，如果 fetch 失敗我們依然進入成功畫面。
                // 實際使用時請取消註解並確保 GAS 網址正確。
                
                /*
                await fetch(gasURL, {
                    method: 'POST',
                    mode: 'no-cors', // 避免 CORS 問題
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataObj)
                });
                */
                
                // 模擬網路延遲
                await new Promise(r => setTimeout(r, 1500));

            } catch (error) {
                console.warn("GAS 尚未設定或發生錯誤，但仍顯示分析報表", error);
            }

            closeModal('modal-loading');
            showSuccess();
        }

        // --- 6. Success Animation & Charts ---
        function showSuccess() {
            // Confetti
            var duration = 3 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({
                    particleCount: 5, angle: 60, spread: 55, origin: { x: 0 },
                    colors: ['#3ABEFF', '#9D4DFF', '#1DD1A1', '#FFE66D']
                });
                confetti({
                    particleCount: 5, angle: 120, spread: 55, origin: { x: 1 },
                    colors: ['#3ABEFF', '#9D4DFF', '#1DD1A1', '#FFE66D']
                });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            // Hide Form, Show Results
            document.getElementById('survey-form').style.display = 'none';
            document.getElementById('results-section').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            generateCharts(finalReportData);
        }

        // --- 7. Chart.js Implementation ---
        function generateCharts(data) {
            Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
            Chart.defaults.color = '#64748b';
            
            // 提取各區塊分數
            const scoresA = []; for(let i=1; i<=8; i++) scoresA.push(data[`Q${i}`]);
            const scoresB = []; for(let i=9; i<=18; i++) scoresB.push(data[`Q${i}`]);
            const scoresC = []; for(let i=19; i<=25; i++) scoresC.push(data[`Q${i}`]);

            // Chart A: Bar
            new Chart(document.getElementById('chartA'), {
                type: 'bar',
                data: {
                    labels: ['Q1', 'Q2', 'Q3', 'Q4', 'Q5', 'Q6', 'Q7', 'Q8'],
                    datasets: [{
                        label: '得分 (1-5)',
                        data: scoresA,
                        backgroundColor: 'rgba(58, 190, 255, 0.6)',
                        borderColor: '#3ABEFF',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: { maintainAspectRatio: false, scales: { y: { min: 0, max: 5 } }, plugins:{ legend: {display:false} } }
            });

            // Chart B: Radar
            new Chart(document.getElementById('chartB'), {
                type: 'radar',
                data: {
                    labels: ['知識建構', '預測概念', '幻覺認知', 'Deepfake', '辨識誤導', '橫向閱讀', '偏見認知', '人類監督', '認知努力', '認知負債'],
                    datasets: [{
                        label: '素養維度',
                        data: scoresB,
                        backgroundColor: 'rgba(157, 77, 255, 0.4)',
                        borderColor: '#9D4DFF',
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#9D4DFF',
                        pointHoverBackgroundColor: '#9D4DFF',
                        pointHoverBorderColor: '#fff'
                    }]
                },
                options: { 
                    maintainAspectRatio: false, 
                    scales: { r: { min: 0, max: 5, ticks: {stepSize: 1} } },
                    plugins:{ legend: {display:false} }
                }
            });

            // Chart C: Bar (Horizontal)
            new Chart(document.getElementById('chartC'), {
                type: 'bar',
                data: {
                    labels: ['查證資料', '避免複製', '批判思考', '不完全依賴', '檢查影像', '解釋風險', '負責任使用'],
                    datasets: [{
                        label: '落實程度 (1-5)',
                        data: scoresC,
                        backgroundColor: 'rgba(29, 209, 161, 0.6)',
                        borderColor: '#1DD1A1',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: { indexAxis: 'y', maintainAspectRatio: false, scales: { x: { min: 0, max: 5 } }, plugins:{ legend: {display:false} } }
            });
        }

        // --- 8. Export to CSV ---
        document.getElementById('btn-export').addEventListener('click', () => {
            const headers = ['Timestamp', 'Class', 'Seat', 'Name', 
                             ...Array.from({length: 30}, (_, i) => `Q${i+1}`), 
                             'Satisfaction_Avg', 'Literacy_Avg', 'Behavior_Avg'];
            
            const row = [
                finalReportData.timestamp, finalReportData.class, finalReportData.seat, finalReportData.name,
                ...Array.from({length: 30}, (_, i) => `"${finalReportData[`Q${i+1}`] ? finalReportData[`Q${i+1}`].replace(/"/g, '""') : ''}"`),
                finalReportData.satisfaction_avg, finalReportData.literacy_avg, finalReportData.behavior_avg
            ];

            const csvContent = "\uFEFF" + headers.join(',') + "\n" + row.join(','); // \uFEFF for Excel UTF-8 BOM
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `AI素養問卷_${finalReportData.class}_${finalReportData.name}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

    </script>
</body>
